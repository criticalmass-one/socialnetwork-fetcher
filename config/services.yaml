# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices/configuration.html#application-related-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $criticalmassHostname: '%env(CRITICALMASS_HOSTNAME)%'
            $rssAppApiKey: '%env(RSS_APP_API_KEY)%'
            $rssAppApiSecret: '%env(RSS_APP_API_SECRET)%'
            $webAdminUsername: '%env(WEB_ADMIN_USERNAME)%'
            $webAdminPasswordHash: '%env(WEB_ADMIN_PASSWORD_HASH)%'
            $mediaDirectory: '%kernel.project_dir%/public/media'
            $ytDlpCookiesFile: '%env(YT_DLP_COOKIES_FILE)%'
            $whisperCliPath: '%env(WHISPER_CLI_PATH)%'
            $whisperModelPath: '%env(WHISPER_MODEL_PATH)%'
            $whisperLanguage: '%env(WHISPER_LANGUAGE)%'
            $vapidPublicKey: '%env(VAPID_PUBLIC_KEY)%'
            $vapidPrivateKey: '%env(VAPID_PRIVATE_KEY)%'
            $vapidSubject: '%env(VAPID_SUBJECT)%'
            $mediaUploadToken: '%env(MEDIA_UPLOAD_TOKEN)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/*'
        exclude: '../src/{DependencyInjection,Entity,Migrations,Tests,Kernel.php}'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\FeedItemPersister\FeedItemPersisterInterface:
        alias: App\FeedItemPersister\DoctrineFeedItemPersister

    App\ProfilePersister\ProfilePersisterInterface:
        alias: App\ProfilePersister\DoctrineProfilePersister

    App\ProfileFetcher\ProfileFetcherInterface:
        alias: App\ProfileFetcher\DoctrineProfileFetcher

    App\RssApp\RssAppInterface:
        alias: App\RssApp\RssApp

    App\FeedFetcher\FeedFetcherInterface:
        alias: App\FeedFetcher\FeedFetcher
