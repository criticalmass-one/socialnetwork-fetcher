security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        client_token_provider:
            id: App\Security\ClientTokenUserProvider

        web_user_provider:
            id: App\Security\WebUserProvider

        web_combined_provider:
            chain:
                providers: ['web_user_provider', 'client_token_provider']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            custom_authenticators:
                - App\Security\ApiTokenAuthenticator
            provider: client_token_provider

        main:
            pattern: ^/
            provider: web_combined_provider
            lazy: true
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                enable_csrf: true
            # "Angemeldet bleiben": signature-based (no DB table), only issued when
            # the login form sends the _remember_me checkbox.
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # 30 days
                path: /
            custom_authenticators:
                - App\Security\WebTokenAuthenticator
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/api/doc, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_API_CLIENT }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        # Public per-group feed pages are reachable without authentication.
        - { path: ^/p/, roles: PUBLIC_ACCESS }
        # Browser media-upload endpoint: authenticated by its own bearer token in
        # the controller, so it is opened here (the admin catch-all would 302 it).
        - { path: ^/media-upload, roles: PUBLIC_ACCESS }
        # Group management is available to both admins and client-token users.
        - { path: ^/groups, roles: [ROLE_ADMIN, ROLE_API_CLIENT] }
        - { path: ^/, roles: ROLE_ADMIN }
